name: Publicar no GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAGES: "true"
      NITRO_PRESET: static
      VITE_SUPABASE_PROJECT_ID: fzimgcpbmtekhddjczlb
      VITE_SUPABASE_PUBLISHABLE_KEY: sb_publishable_LEkNaI4mFWJoRSQB_WPz9A_oFSIwtXT
      VITE_SUPABASE_URL: https://fzimgcpbmtekhddjczlb.supabase.co
    steps:
      - name: Baixar codigo
        uses: actions/checkout@v4

      - name: Preparar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Gerar site estatico
        run: npm run build

      - name: Preparar rotas do aplicativo
        run: |
          test -f .output/public/index.html
          cp .output/public/index.html .output/public/404.html
          touch .output/public/.nojekyll

      - name: Enviar arquivos do site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .output/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Publicar
        id: deployment
        uses: actions/deploy-pages@v4